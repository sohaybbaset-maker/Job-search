name: Daily Job Search — Michael Page Riyadh

on:
  schedule:
    # 05:00 UTC = 08:00 AST (Arabia Standard Time)
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  search-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run job search
        id: search
        env:
          TARGET_EMAIL: sohaybbaset@gmail.com
        run: |
          python - <<'PYEOF'
          import os, json, datetime, requests
          from bs4 import BeautifulSoup

          TODAY = datetime.date.today().isoformat()
          SEARCH_URL = "https://www.michaelpage.com.sa/jobs/business-development"
          HEADERS = {"User-Agent": "Mozilla/5.0 (compatible; JobSearchBot/1.0)"}
          KEYWORDS = [
              "VP", "Vice President", "Director", "General Manager",
              "Country Manager", "Head of", "Business Development",
              "Strategy", "Market Entry",
          ]

          try:
              resp = requests.get(SEARCH_URL, headers=HEADERS, params={"location": "riyadh"}, timeout=30)
              soup = BeautifulSoup(resp.text, "lxml")
              cards = soup.select("h2.job-title, h3.job-title, [class*='job-title']")
              jobs = []
              for card in cards:
                  title = card.get_text(strip=True)
                  if any(k.lower() in title.lower() for k in KEYWORDS):
                      link_tag = card.find_parent("a") or card.find("a")
                      href = link_tag["href"] if link_tag else SEARCH_URL
                      if href.startswith("/"):
                          href = "https://www.michaelpage.com.sa" + href
                      jobs.append({"title": title, "url": href})
          except Exception as e:
              jobs = [{"title": f"Scrape failed: {e}", "url": SEARCH_URL}]

          # Build Markdown report
          lines = [
              f"# Job Search Report — {TODAY}\n",
              "**Platform:** Michael Page  ",
              "**Location:** Riyadh, Saudi Arabia  ",
              "**Seniority:** VP / Director / GM / Country Manager  \n",
              "---\n",
              "## Results\n",
              "| # | Title | Link |",
              "|---|-------|------|",
          ]
          for i, j in enumerate(jobs, 1):
              lines.append(f"| {i} | {j['title']} | [View]({j['url']}) |")

          if not jobs:
              lines.append("| — | No matching roles found today | — |")

          lines += [
              "\n---\n",
              f"*Total found: {len(jobs)}*  ",
              f"*Generated by [job-search-cv.yml](../../.github/workflows/job-search-cv.yml)*",
          ]

          report_dir = "reports"
          os.makedirs(report_dir, exist_ok=True)
          report_path = f"{report_dir}/{TODAY}_report.md"
          with open(report_path, "w") as f:
              f.write("\n".join(lines))

          # Write email body for next step
          email_body = "\n".join([
              f"Daily Job Search Report — {TODAY}",
              "Michael Page · Riyadh · VP / Director / GM",
              "",
          ] + [f"{i}. {j['title']}  {j['url']}" for i, j in enumerate(jobs, 1)] + [
              "",
              f"View all: {SEARCH_URL}#location=riyadh",
          ])
          with open("/tmp/email_body.txt", "w") as f:
              f.write(email_body)
          with open("/tmp/email_subject.txt", "w") as f:
              f.write(f"Job Search Report {TODAY} — {len(jobs)} roles found")

          print(f"Found {len(jobs)} roles. Report saved to {report_path}")
          PYEOF

      - name: Send email via SMTP
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TO_EMAIL: sohaybbaset@gmail.com
        run: |
          python - <<'PYEOF'
          import os, smtplib
          from email.mime.text import MIMEText

          subject = open("/tmp/email_subject.txt").read().strip()
          body    = open("/tmp/email_body.txt").read().strip()

          msg = MIMEText(body)
          msg["Subject"] = subject
          msg["From"]    = os.environ["SMTP_USER"]
          msg["To"]      = os.environ["TO_EMAIL"]

          with smtplib.SMTP(os.environ["SMTP_HOST"], int(os.environ["SMTP_PORT"])) as s:
              s.starttls()
              s.login(os.environ["SMTP_USER"], os.environ["SMTP_PASS"])
              s.send_message(msg)

          print(f"Email sent to {os.environ['TO_EMAIL']}")
          PYEOF

      - name: Commit report
        run: |
          git config user.name  "job-search-bot"
          git config user.email "sohaybbaset@gmail.com"
          git add reports/
          git diff --cached --quiet || git commit -m "chore: daily job search report $(date +%F)"
          git push
