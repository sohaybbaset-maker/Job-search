name: Daily Job Search — Curated Riyadh (9 Platforms)

on:
  schedule:
    # 05:00 UTC = 08:00 AST (Arabia Standard Time)
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  search-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml python-jobspy

      - name: Run curated job search
        id: search
        env:
          TARGET_EMAIL: sohaybbaset@gmail.com
        run: |
          python - <<'PYEOF'
          import os, datetime, requests
          from bs4 import BeautifulSoup

          TODAY   = datetime.date.today().isoformat()
          HEADERS = {
              "User-Agent": (
                  "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 "
                  "(KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
              ),
              "Accept-Language": "en-US,en;q=0.9",
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
          }

          # ════════════════════════════════════════════════════════════
          # PROFILE-BASED SCORING ENGINE
          # Built for: Sohayb Baset — VP BD · Venture · PropTech · KSA
          # ════════════════════════════════════════════════════════════

          # Any of these → drop immediately, don't send
          HARD_EXCLUDE = [
              "saudi national", "nationals only", "saudiz",
              "it director", "cio", "chief information officer",
              "chief technology", "cto", "software engineer",
              "data scientist", "devops", "cybersecurity", "network engineer",
              "laundry", "construction equipment", "used truck",
              "compliance officer", "anti-money", "aml", "audit",
              "treasury", "tax manager", "legal counsel",
              "internship", "graduate program", "entry level",
              "media director", "head of media", "journalist",
              "clinical", "radiolog", "surgeon", "pharmacist",
              "oil & gas engineer", "petroleum engineer",
              "head of it", "it solutions", "infrastructure director",
              "project director",  # pure PM, not BD
          ]

          # Title must contain at least one of these (seniority gate)
          SENIORITY_GATE = [
              "vp", "vice president", "director", "general manager",
              "country manager", "head of", "chief", "managing director",
              "commercial director", "cbdo", "cbo", "cco",
          ]

          # Scoring: function match (what he does)
          FUNCTION_SCORE = {
              # Core BD/Growth — max boost
              "business development": 40,
              " bd ": 35,
              "partnerships": 35,
              "market entry": 40,
              "commercial director": 35,
              "revenue": 30,
              "growth": 25,
              "channel partner": 30,
              "go-to-market": 35,
              "strategic partnerships": 40,
              # Sector strengths — strong boost
              "real estate": 30,
              "proptech": 35,
              "property": 25,
              "leasing": 20,
              "corporate learning": 35,
              "learning & development": 35,
              "l&d": 30,
              "edtech": 30,
              "training": 20,
              "venture": 30,
              "startup": 25,
              "investment": 25,
              "portfolio": 25,
              "ecosystem": 25,
              "incubat": 20,
              # Strategy/ops — moderate
              "strategy": 20,
              "strategic": 15,
              "innovation": 15,
              "cluster director": 20,
              "regional": 15,
              "sales director": 20,
          }

          # Sectors that are a mismatch — penalise
          SECTOR_PENALTY = [
              "medical device", "pharmaceutical", "clinical trial",
              "oil and gas", "oil & gas", "petroleum", "mining",
              "construction", "infrastructure", "facilities management",
              "military", "defence", "defense",
              "hotel", "hospitality", "food & beverage",
              "media", "film", "entertainment",
              "fashion", "retail operations",
              "institutional sales",   # finance sector
              "treasury", "asset management",
          ]

          SCORE_THRESHOLD = 60  # only send roles above this

          def score_job(title, description=""):
              t = title.lower()
              d = description.lower() if description else ""
              combined = t + " " + d

              # Hard exclude check
              if any(x in combined for x in HARD_EXCLUDE):
                  return 0, "excluded"

              # Seniority gate — must pass
              if not any(x in t for x in SENIORITY_GATE):
                  return 0, "too junior"

              score = 0

              # Seniority level points (10-30)
              if any(x in t for x in ["vp", "vice president", "chief", "cbdo", "cbo"]):
                  score += 30
              elif any(x in t for x in ["director", "general manager", "managing director", "country manager", "head of"]):
                  score += 25
              else:
                  score += 10

              # Function match (0-40)
              fn_score = 0
              for kw, pts in FUNCTION_SCORE.items():
                  if kw in combined:
                      fn_score = max(fn_score, pts)
              score += fn_score

              # Sector penalty (-15)
              if any(x in combined for x in SECTOR_PENALTY):
                  score -= 15

              # KSA/GCC region bonus (+5)
              if any(x in combined for x in ["saudi", "ksa", "riyadh", "gcc", "gulf"]):
                  score += 5

              label = "🟢 Strong Match" if score >= 80 else "🟡 Good Match"
              return score, label

          # ════════════════════════════════════════════════════════════
          # SCRAPING SOURCES
          # ════════════════════════════════════════════════════════════

          # Broad initial keywords — scoring will filter down
          SEARCH_KEYWORDS = [
              "VP", "Vice President", "Director", "General Manager",
              "Country Manager", "Head of", "Business Development",
              "Chief Business", "Managing Director", "Commercial Director",
              "Head of Partnerships", "Head of Sales",
          ]

          all_jobs     = []
          source_stats = {}

          def is_candidate(title):
              return any(k.lower() in title.lower() for k in SEARCH_KEYWORDS)

          def record(source, jobs):
              source_stats[source] = len(jobs)
              all_jobs.extend(jobs)
              print(f"  [{source}] {len(jobs)} candidates")

          # ── python-jobspy: LinkedIn ──
          print("\n── LinkedIn (python-jobspy) ──")
          try:
              from jobspy import scrape_jobs
              df = scrape_jobs(
                  site_name=["linkedin"],
                  search_term="Business Development VP Director General Manager Saudi Arabia",
                  location="Riyadh, Saudi Arabia",
                  results_wanted=40,
                  hours_old=72,
                  verbose=0,
              )
              li = []
              for _, row in df.iterrows():
                  title = str(row.get("title", "")).strip()
                  if title and title != "nan" and is_candidate(title):
                      li.append({
                          "title":       title,
                          "company":     str(row.get("company", "")).replace("nan", "").strip(),
                          "url":         str(row.get("job_url", "")).replace("nan", "").strip(),
                          "description": str(row.get("description", "")).replace("nan", "").strip(),
                          "source":      "LinkedIn",
                      })
              record("LinkedIn", li)
          except Exception as e:
              print(f"  LinkedIn error: {e}")
              source_stats["LinkedIn"] = 0

          # ── python-jobspy: Indeed + Glassdoor + Google + Bayt ──
          print("\n── Indeed / Glassdoor / Google / Bayt (python-jobspy) ──")
          try:
              SPY_TERMS = [
                  "VP Business Development Saudi Arabia",
                  "Director Business Development Riyadh",
                  "General Manager Saudi Arabia",
                  "Country Manager Saudi Arabia",
                  "Head of Partnerships Riyadh",
              ]
              raw = []
              for term in SPY_TERMS:
                  try:
                      df = scrape_jobs(
                          site_name=["indeed", "glassdoor", "google", "bayt"],
                          search_term=term,
                          location="Riyadh, Saudi Arabia",
                          results_wanted=30,
                          hours_old=72,
                          country_indeed="Saudi Arabia",
                          verbose=0,
                      )
                      for _, row in df.iterrows():
                          title = str(row.get("title", "")).strip()
                          site  = str(row.get("site",  "")).strip()
                          if title and title != "nan" and is_candidate(title):
                              raw.append({
                                  "title":       title,
                                  "company":     str(row.get("company", "")).replace("nan","").strip(),
                                  "url":         str(row.get("job_url", "")).replace("nan","").strip(),
                                  "description": str(row.get("description","")).replace("nan","").strip(),
                                  "source":      site.title() or "JobSpy",
                              })
                  except Exception as e:
                      print(f"  term error: {e}")

              seen = set()
              for j in raw:
                  k = j["title"].lower()[:45]
                  if k not in seen:
                      seen.add(k)
                      all_jobs.append(j)
              for src in ["Indeed", "Glassdoor", "Google", "Bayt"]:
                  cnt = sum(1 for j in raw if j["source"].lower() == src.lower())
                  source_stats[src] = cnt
                  print(f"  [{src}] {cnt} candidates")
          except Exception as e:
              print(f"  JobSpy block error: {e}")

          # ── HTML scrapers ──
          def html_scrape(source, candidates, selectors):
              jobs = []
              for url, base in candidates:
                  try:
                      resp = requests.get(url, headers=HEADERS, timeout=30)
                      if resp.status_code != 200:
                          continue
                      soup = BeautifulSoup(resp.text, "lxml")
                      for sel in selectors:
                          for card in soup.select(sel):
                              title = card.get_text(strip=True)
                              if len(title) < 5 or not is_candidate(title):
                                  continue
                              link = card if card.name == "a" else (card.find("a") or card.find_parent("a"))
                              href = (link["href"] if link and link.get("href") else url)
                              if href.startswith("/"):
                                  href = base + href
                              jobs.append({"title": title, "company": "", "url": href,
                                           "description": "", "source": source})
                      if jobs:
                          break
                  except Exception as e:
                      print(f"  {source} error: {e}")
              return jobs

          print("\n── Michael Page ──")
          record("Michael Page", html_scrape("Michael Page", [
              ("https://www.michaelpage.ae/jobs/saudi-arabia",          "https://www.michaelpage.ae"),
              ("https://www.michaelpage.com/jobs/saudi-arabia/riyadh",  "https://www.michaelpage.com"),
          ], ["h2.job-title","h3.job-title","[class*='job-title']","a[data-ga-label]",
              ".job-card h2",".jobCard__title","h3[class*='title']","h2[class*='title']"]))

          print("\n── GulfTalent ──")
          gt_raw = []
          for slug, base in [
              ("business-development", "https://www.gulftalent.com"),
              ("general-manager",      "https://www.gulftalent.com"),
              ("vice-president",       "https://www.gulftalent.com"),
          ]:
              gt_raw.extend(html_scrape("GulfTalent",
                  [(f"https://www.gulftalent.com/saudi-arabia/jobs/title/{slug}", base)],
                  ["h2.job_title","h3.job_title",".job-title a","[class*='jobtitle']",
                   ".listing-item h2",".listing-item h3",".job-listing-item__title",
                   "h2 a[href*='/job']","h3 a[href*='/job']"]))
          seen_gt = set()
          for j in gt_raw:
              k = j["title"].lower()[:45]
              if k not in seen_gt:
                  seen_gt.add(k)
                  all_jobs.append(j)
          source_stats["GulfTalent"] = len([j for j in gt_raw if j["source"] == "GulfTalent"])
          print(f"  [GulfTalent] {source_stats['GulfTalent']} candidates")

          print("\n── Naukrigulf ──")
          ng_raw = []
          for slug, base in [
              ("vp-jobs-in-saudi-arabia",                           "https://www.naukrigulf.com"),
              ("director-business-development-jobs-in-saudi-arabia","https://www.naukrigulf.com"),
              ("general-manager-jobs-in-saudi-arabia",              "https://www.naukrigulf.com"),
          ]:
              ng_raw.extend(html_scrape("Naukrigulf",
                  [(f"https://www.naukrigulf.com/{slug}", base)],
                  [".designation-title",".job-title",".info-position a",
                   "[class*='designation'] a","h2 a[href*='/job/']","h3 a[href*='/job/']"]))
          seen_ng = set()
          for j in ng_raw:
              k = j["title"].lower()[:45]
              if k not in seen_ng:
                  seen_ng.add(k)
                  all_jobs.append(j)
          source_stats["Naukrigulf"] = len(ng_raw)
          print(f"  [Naukrigulf] {source_stats['Naukrigulf']} candidates")

          print("\n── Robert Walters ──")
          record("Robert Walters", html_scrape("Robert Walters",
              [("https://www.robertwalters.ae/jobs/saudi-arabia.html","https://www.robertwalters.ae")],
              [".job-result__title",".job-title a","[class*='job-result'] h2 a",
               ".search-results__item h2 a","h2 a[href*='/jobs/']"]))

          # ════════════════════════════════════════════════════════════
          # SCORE + FILTER
          # ════════════════════════════════════════════════════════════
          print("\n── Scoring & filtering ──")

          # Global dedup first
          seen_global = set()
          unique_jobs = []
          for j in all_jobs:
              k = j["title"].lower()[:50]
              if k not in seen_global:
                  seen_global.add(k)
                  unique_jobs.append(j)

          scored = []
          for j in unique_jobs:
              s, label = score_job(j["title"], j.get("description", ""))
              if s >= SCORE_THRESHOLD:
                  scored.append({**j, "score": s, "label": label})

          scored.sort(key=lambda x: x["score"], reverse=True)

          total_scanned = len(unique_jobs)
          total_sent    = len(scored)
          print(f"  Scanned: {total_scanned}  →  Matched: {total_sent}")

          # ════════════════════════════════════════════════════════════
          # BUILD REPORT & EMAIL
          # ════════════════════════════════════════════════════════════
          lines = [
              f"# Job Search Report — {TODAY}\n",
              "**Platforms:** Michael Page · GulfTalent · Indeed · LinkedIn · Glassdoor · Google · Bayt · Naukrigulf · Robert Walters  ",
              "**Location:** Riyadh, Saudi Arabia  ",
              "**Profile match threshold:** 60 / 100\n",
              "---\n",
              f"## Curated Matches ({total_sent} of {total_scanned} scanned)\n",
              "| # | Score | Match | Title | Company | Source | Link |",
              "|---|-------|-------|-------|---------|--------|------|",
          ]
          for i, j in enumerate(scored, 1):
              co   = j.get("company") or "—"
              url  = j.get("url", "")
              link = f"[View]({url})" if url else "—"
              lines.append(f"| {i} | {j['score']} | {j['label']} | {j['title']} | {co} | {j['source']} | {link} |")

          lines += [
              "\n---\n",
              "## Source Scan Summary\n",
              "| Platform | Scanned |",
              "|----------|---------|",
          ]
          for src in ["LinkedIn","Indeed","Glassdoor","Google","Bayt",
                      "Michael Page","GulfTalent","Naukrigulf","Robert Walters"]:
              lines.append(f"| {src} | {source_stats.get(src, 0)} |")
          lines += [
              f"\n*{total_scanned} scanned → {total_sent} matched your profile*  ",
              f"*Generated by [job-search-cv.yml](../../.github/workflows/job-search-cv.yml)*",
          ]

          report_dir  = "reports"
          os.makedirs(report_dir, exist_ok=True)
          report_path = f"{report_dir}/{TODAY}_report.md"
          with open(report_path, "w") as f:
              f.write("\n".join(lines))

          # Email
          if scored:
              strong = [j for j in scored if j["label"].startswith("🟢")]
              good   = [j for j in scored if j["label"].startswith("🟡")]

              email_lines = [
                  f"وظائف مناسبة ليك — {TODAY}",
                  f"من {total_scanned} وظيفة مسحوبة → {total_sent} بتناسب بروفايلك فقط",
                  "",
              ]
              if strong:
                  email_lines.append("━━ 🟢 أقوى تطابق ━━")
                  for i, j in enumerate(strong, 1):
                      co  = j.get("company","")
                      url = j.get("url","")
                      email_lines.append(f"\n{i}. {j['title']}" + (f"  @  {co}" if co else ""))
                      email_lines.append(f"   Score: {j['score']}/100  |  {j['source']}")
                      if url:
                          email_lines.append(f"   {url}")
              if good:
                  email_lines.append("\n━━ 🟡 تستحق النظر ━━")
                  for i, j in enumerate(good, 1):
                      co  = j.get("company","")
                      url = j.get("url","")
                      email_lines.append(f"\n{i}. {j['title']}" + (f"  @  {co}" if co else ""))
                      email_lines.append(f"   Score: {j['score']}/100  |  {j['source']}")
                      if url:
                          email_lines.append(f"   {url}")
              email_lines += [
                  "",
                  f"━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━",
                  f"تم مسح {total_scanned} وظيفة من 9 مصادر",
                  "المرشّح: سهيب باسيط | VP BD · PropTech · Venture · KSA",
              ]
              subject = f"وظائف مناسبة {TODAY} — {total_sent} من {total_scanned} 🎯"
          else:
              email_lines = [
                  f"تقرير البحث — {TODAY}",
                  f"مسحنا {total_scanned} وظيفة — لا يوجد تطابق كافٍ اليوم.",
                  "سيتم إعادة المحاولة غداً.",
              ]
              subject = f"تقرير البحث {TODAY} — لا توجد وظائف مناسبة اليوم"

          with open("/tmp/email_body.txt", "w") as f:
              f.write("\n".join(email_lines))
          with open("/tmp/email_subject.txt", "w") as f:
              f.write(subject)

          print(f"\n✓ {total_sent} curated roles from {total_scanned} scanned.")
          PYEOF

      - name: Send email via SMTP
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TO_EMAIL: sohaybbaset@gmail.com
        run: |
          python - <<'PYEOF'
          import os, smtplib
          from email.mime.text import MIMEText

          subject = open("/tmp/email_subject.txt").read().strip()
          body    = open("/tmp/email_body.txt").read().strip()

          msg = MIMEText(body, "plain", "utf-8")
          msg["Subject"] = subject
          msg["From"]    = os.environ["SMTP_USER"]
          msg["To"]      = os.environ["TO_EMAIL"]

          with smtplib.SMTP(os.environ["SMTP_HOST"], int(os.environ["SMTP_PORT"])) as s:
              s.starttls()
              s.login(os.environ["SMTP_USER"], os.environ["SMTP_PASS"])
              s.send_message(msg)

          print(f"Email sent → {os.environ['TO_EMAIL']}")
          PYEOF

      - name: Commit report
        run: |
          git config user.name  "job-search-bot"
          git config user.email "sohaybbaset@gmail.com"
          git add reports/
          git diff --cached --quiet || git commit -m "chore: daily job search report $(date +%F)"
          git push
